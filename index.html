<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Precios | Vacuno, Cerdo, Pollo</title>
  
  <!-- SEO & Social Meta Tags -->
  <meta name="description" content="Lista de precios actualizada en tiempo real de productos Vacuno, Cerdo y Pollo.">
  <meta property="og:title" content="Lista de Precios">
  <meta property="og:description" content="Consulta nuestros precios siempre actualizados de vacuno, cerdo y pollo.">
  <meta property="og:type" content="website">
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
  


  <style>
    /* CSS VARIABLES - DESIGN SYSTEM */
    :root {
      /* Palette */
      --primary: #10b981; /* Emerald Green */
      --primary-hover: #059669;
      --primary-light: rgba(16, 185, 129, 0.15);
      
      --accent: #f59e0b; /* Amber */
      
      /* Light Mode Colors */
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --bg-app: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(226, 232, 240, 0.8);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --badge-bg: #f1f5f9;
      --badge-text: #475569;
      --border-color: #e2e8f0;
      
      /* Shadow System */
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      
      --glass-blur: blur(12px);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      
      --transition-fast: 0.15s ease;
      --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      /* Dark Mode Colors */
      --bg-gradient: linear-gradient(135deg, #090d16 0%, #020617 100%);
      --bg-app: #090d16;
      --card-bg: rgba(15, 23, 42, 0.85);
      --card-border: rgba(30, 41, 59, 0.8);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-light: #64748b;
      --badge-bg: #1e293b;
      --badge-text: #cbd5e1;
      --border-color: #1e293b;
      
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
    }

    /* GLOBAL STYLES */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-app);
      background-image: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      line-height: 1.5;
      padding: 24px 16px 100px 16px;
      min-height: 100vh;
      transition: background var(--transition-normal), color var(--transition-normal);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* GLASSMORPHISM UTILITY */
    .glass {
      background: var(--card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      transition: background var(--transition-normal), border var(--transition-normal), box-shadow var(--transition-normal);
    }

    /* TOP HEADER CONTROLS */
    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .theme-toggle, .action-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition-fast);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
    }

    .theme-toggle:hover, .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary);
    }

    .theme-toggle:active, .action-btn:active {
      transform: translateY(0);
    }

    .theme-toggle svg, .action-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 32px;
      padding: 16px 0;
    }

    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      margin-bottom: 16px;
      animation: pulse-slow 3s infinite ease-in-out;
    }

    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 2.2rem;
      letter-spacing: -0.025em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--text-main) 30%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 500;
    }

    .last-update-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      background: var(--primary-light);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 50px;
      margin-top: 12px;
      font-weight: 600;
    }
    
    .last-update-badge .dot {
      width: 6px;
      height: 6px;
      background-color: var(--primary);
      border-radius: 50%;
      animation: pulse-dot 1.5s infinite;
    }

    /* CONTROLS (SEARCH & CATEGORIES) */
    .controls-wrapper {
      position: sticky;
      top: 12px;
      z-index: 100;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
    }

    /* SEARCH BAR */
    .search-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-app);
      color: var(--text-main);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all var(--transition-fast);
      box-shadow: inset var(--shadow-sm);
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .clear-search {
      position: absolute;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 50%;
      transition: background var(--transition-fast);
    }

    .clear-search:hover {
      background: var(--badge-bg);
      color: var(--text-main);
    }

    .clear-search svg {
      width: 16px;
      height: 16px;
    }

    /* CATEGORIES PILLS */
    .categories-pills {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none; /* Firefox */
      padding: 2px 0;
      -webkit-overflow-scrolling: touch;
    }

    .categories-pills::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }

    .pill {
      flex-shrink: 0;
      background: var(--bg-app);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition-fast);
    }

    .pill:hover {
      border-color: var(--primary);
      color: var(--text-main);
    }

    .pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
    }

    /* PRODUCT CONTAINER & CARDS */
    .categoria-seccion {
      margin-bottom: 28px;
      padding: 20px;
      animation: fadeIn 0.4s ease-out;
    }

    .categoria-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 16px;
      color: var(--text-main);
      border-bottom: 2px solid var(--primary-light);
      padding-bottom: 8px;
    }

    .categoria-title-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .categoria-iva {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      background: var(--primary-light);
      padding: 4px 10px;
      border-radius: 50px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .categoria-emoji {
      font-size: 1.5rem;
    }

    .productos-lista {
      display: flex;
      flex-direction: column;
    }

    .producto {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-color);
      transition: all var(--transition-fast);
    }

    .producto:last-child {
      border-bottom: none;
    }

    .producto:hover {
      padding-left: 6px;
      padding-right: 6px;
      background-color: var(--primary-light);
      border-radius: var(--radius-sm);
    }

    .producto-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 70%;
    }

    .nombre {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-main);
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .marca {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--badge-text);
      background: var(--badge-bg);
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    .precio-container {
      text-align: right;
    }

    .precio {
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--primary);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* SKELETON LOADERS */
    .skeleton {
      animation: skeleton-loading 1.5s infinite linear;
      background: linear-gradient(90deg, var(--border-color) 25%, var(--badge-bg) 50%, var(--border-color) 75%);
      background-size: 200% 100%;
      border-radius: 4px;
    }

    .skeleton-text-title {
      height: 24px;
      width: 140px;
      margin-bottom: 16px;
    }

    .skeleton-item {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .skeleton-text-line1 {
      height: 18px;
      width: 180px;
      margin-bottom: 6px;
    }

    .skeleton-text-line2 {
      height: 14px;
      width: 80px;
    }

    .skeleton-price {
      height: 22px;
      width: 70px;
    }

    /* STATE MESSAGES (EMPTY / ERROR) */
    .state-container {
      text-align: center;
      padding: 40px 20px;
      animation: fadeIn 0.3s ease-out;
    }

    .state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .state-title {
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .state-text {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 20px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .retry-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 24px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
    }

    .retry-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    /* MODAL WINDOW (QR CODE) */
    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity var(--transition-normal);
      padding: 16px;
    }

    .modal-backdrop.active {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      background: var(--bg-app);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 420px;
      padding: 28px;
      box-shadow: var(--shadow-lg);
      transform: scale(0.95);
      transition: transform var(--transition-normal), background var(--transition-normal);
      text-align: center;
      position: relative;
    }

    .modal-backdrop.active .modal-content {
      transform: scale(1);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--badge-bg);
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }

    .modal-close:hover {
      background: var(--border-color);
      color: var(--text-main);
      transform: rotate(90deg);
    }

    .modal-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      margin-bottom: 6px;
    }

    .modal-desc {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-bottom: 24px;
    }

    .qr-frame {
      background: white;
      padding: 16px;
      border-radius: var(--radius-md);
      display: inline-block;
      box-shadow: var(--shadow-md);
      margin-bottom: 24px;
    }

    #qrcode img {
      display: block;
      margin: 0 auto;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .modal-btn {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all var(--transition-fast);
      border: none;
    }

    .modal-btn-primary {
      background: var(--primary);
      color: white;
    }

    .modal-btn-primary:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .modal-btn-secondary {
      background: var(--badge-bg);
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .modal-btn-secondary:hover {
      background: var(--border-color);
    }

    /* WHATSAPP FLOAT BUTTON */
    .whatsapp-float {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #25D366;
      color: white;
      padding: 14px 22px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      box-shadow: 0 4px 16px rgba(37, 211, 102, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 99;
      transition: all var(--transition-normal);
      animation: float-pulse 2s infinite;
    }

    .whatsapp-float:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
    }

    .whatsapp-float svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes pulse-slow {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @keyframes float-pulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(37, 211, 102, 0.4); }
      50% { box-shadow: 0 4px 24px rgba(37, 211, 102, 0.7); }
    }

    /* PRINT STYLES - Optimized for QR printout */
    @media print {
      body {
        background: white !important;
        color: black !important;
        padding: 0;
        margin: 0;
      }

      .container, .top-actions, header, .controls-wrapper, #contenido, .whatsapp-float, .modal-close, .modal-desc, .modal-actions, .modal-title {
        display: none !important;
      }

      .modal-backdrop {
        position: absolute;
        background: white !important;
        display: flex !important;
        opacity: 1 !important;
        align-items: center;
        justify-content: center;
        width: 100% !important;
        height: auto !important;
        z-index: auto;
        padding: 0;
      }

      .modal-content {
        border: none !important;
        box-shadow: none !important;
        transform: none !important;
        max-width: 100% !important;
        padding: 0;
        margin-top: 10%;
      }

      .qr-print-header {
        display: block !important;
        text-align: center;
        margin-bottom: 24px;
      }

      .qr-print-header h2 {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 8px;
        color: black;
      }

      .qr-print-header p {
        font-size: 1.1rem;
        color: #444;
      }

      .qr-frame {
        box-shadow: none !important;
        border: 2px solid #000;
        padding: 24px;
        margin-bottom: 20px;
      }

      .qr-print-footer {
        display: block !important;
        text-align: center;
        font-size: 1rem;
        color: #555;
        margin-top: 16px;
      }
    }

    /* Hidden elements in screen mode, visible only in print mode */
    .qr-print-header, .qr-print-footer {
      display: none;
    }
  </style>
</head>

      </button>

      <div style="display: flex; gap: 8px;">
        <button class="action-btn" id="shareBtn">
          <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
          Compartir
        </button>
      </div>
    </div>

    <!-- MAIN HEADER -->
    <header>
      <div class="logo-container" style="font-size: 2.2rem;">
        <img src="logo.png" alt="Logo Carnes Lira" class="logo-img" onerror="this.style.display='none'; this.parentNode.innerText='🥩';">
      </div>
      <h1>Carnes Lira</h1>
      <p>Lista de Precios Oficial</p>
      <div class="last-update-badge" id="updateBadge">
        <div class="dot"></div>
        <span id="updateText">Cargando precios...</span>
      </div>
    </header>

    <!-- SEARCH & FILTERS PANEL (STICKY GLASS) -->
    <div class="controls-wrapper glass">
      <div class="search-container">
        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar producto o marca...">
        <button class="clear-search" id="clearSearch" aria-label="Limpiar búsqueda">
          <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      
      <div class="categories-pills" id="categoryPills">
        <button class="pill active" data-category="all">🔍 Todas</button>
        <button class="pill" data-category="vacuno">🥩 Vacuno</button>
        <button class="pill" data-category="cerdo">🐷 Cerdo</button>
        <button class="pill" data-category="pollo">🐔 Pollo</button>
      </div>
    </div>

    <!-- MAIN CONTENT CONTAINER -->
    <main id="contenido">
      <!-- SKELETON LOADER (Shown initially while fetching data) -->
      <div id="loadingSkeleton">
        <div class="categoria-seccion glass">
          <div class="skeleton skeleton-text-title"></div>
          <div class="productos-lista">
            <div class="skeleton-item">
              <div>
                <div class="skeleton skeleton-text-line1"></div>
                <div class="skeleton skeleton-text-line2"></div>
              </div>
              <div class="skeleton skeleton-price"></div>
            </div>
            <div class="skeleton-item">
              <div>
                <div class="skeleton skeleton-text-line1"></div>
                <div class="skeleton skeleton-text-line2"></div>
              </div>
              <div class="skeleton skeleton-price"></div>
            </div>
            <div class="skeleton-item">
              <div>
                <div class="skeleton skeleton-text-line1"></div>
                <div class="skeleton skeleton-text-line2"></div>
              </div>
              <div class="skeleton skeleton-price"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- WHATSAPP FLOATING CTA -->
  <a class="whatsapp-float" id="whatsappFloatBtn"
     href="https://wa.me/56962608852?text=Hola,%20vi%20tu%20lista%20de%20precios%20y%20me%20gustar%C3%ADa%20hacer%20un%20pedido%20o%20consulta."
     target="_blank">
    <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.455L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.625 1.451 5.437.002 9.851-4.411 9.854-9.845.002-2.634-1.02-5.109-2.877-6.97C16.393 1.88 13.914.855 11.29.855 5.854.855 1.44 5.268 1.437 10.704c-.002 1.522.404 3.013 1.176 4.317L1.65 20.5l5.572-1.46c-.03-.018-.063-.037-.09-.057zM17.47 15.667c-.32-.16-1.89-.932-2.185-1.04-.294-.108-.51-.16-.723.16-.214.32-.828 1.04-1.014 1.255-.187.215-.373.24-.693.08-.32-.16-1.353-.499-2.577-1.59-1-.893-1.675-2.001-1.873-2.338-.198-.338-.02-.52.148-.68.151-.144.32-.373.48-.56.16-.188.214-.32.32-.533.107-.213.054-.4-.027-.56-.08-.16-.724-1.745-.992-2.39-.262-.63-.53-.544-.724-.554-.187-.01-.4-.01-.615-.01s-.56.08-.853.4c-.293.32-1.12 1.1-1.12 2.678 0 1.578 1.15 3.1 1.31 3.315.16.215 2.26 3.45 5.476 4.84.765.33 1.36.527 1.824.674.77.244 1.472.21 2.028.127.62-.093 1.89-.773 2.155-1.48.265-.707.265-1.312.187-1.44-.078-.12-.294-.18-.615-.34z"/></svg>
    Preguntar por WhatsApp
  </a>



  <script>
    // DATA SOURCE
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRq46UR3lu74uwh6pjzBiMGD9li9tZm2I2HUAlXpIJmGAjtv9YF66ZluT5MMEHx__9Lv4PzNIAh80ru/pub?gid=0&single=true&output=csv';
    
    // STATE
    let rawProducts = [];
    let currentFilter = 'all';
    let currentSearch = '';

    // CORE DOM ELEMENTS
    const contenido = document.getElementById('contenido');
    const updateText = document.getElementById('updateText');
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    const categoryPills = document.getElementById('categoryPills');
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const themeText = document.getElementById('themeText');
    const shareBtn = document.getElementById('shareBtn');

    // 1. ROBUST CSV PARSER (Handles quotes, commas, escapes, and windows/mac line-breaks)
    function parseCSV(text) {
      const lines = [];
      let row = [""];
      let inQuotes = false;
      
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i+1];
        
        if (c === '"') {
          if (inQuotes && next === '"') {
            row[row.length - 1] += '"';
            i++; // Skip next quote
          } else {
            inQuotes = !inQuotes;
          }
        } else if (c === ',' && !inQuotes) {
          row.push("");
        } else if ((c === '\r' || c === '\n') && !inQuotes) {
          if (c === '\r' && next === '\n') {
            i++; // Skip line-feed in CRLF
          }
          if (row.length > 1 || row[0] !== "") {
            lines.push(row);
          }
          row = [""];
        } else {
          row[row.length - 1] += c;
        }
      }
      if (row.length > 1 || row[0] !== "") {
        lines.push(row);
      }
      return lines;
    }

    // 2. FETCH AND CONVERT DATA
    function init() {
      fetch(csvUrl)
        .then(response => {
          if (!response.ok) throw new Error('Error al conectar con la hoja de precios');
          return response.text();
        })
        .then(csvText => {
          const rows = parseCSV(csvText.trim());
          if (rows.length <= 1) {
            renderEmptyState('No se encontraron registros en la lista.', 'Asegúrate de que la hoja de Google Sheets tenga datos.');
            return;
          }
          
          // Map header indices dynamically to handle changes in column ordering
          const headers = rows[0].map(h => h.toUpperCase().trim());
          const categoryIdx = headers.indexOf('CATEGORIA') !== -1 ? headers.indexOf('CATEGORIA') : 0;
          const productIdx = headers.indexOf('PRODUCTO') !== -1 ? headers.indexOf('PRODUCTO') : 1;
          const brandIdx = headers.indexOf('MARCA') !== -1 ? headers.indexOf('MARCA') : 2;
          const priceIdx = headers.indexOf('NETO') !== -1 ? headers.indexOf('NETO') : 3;

          rawProducts = rows.slice(1).map((columnas, idx) => {
            const categoriaVal = columnas[categoryIdx] ? columnas[categoryIdx].trim() : '';
            const productoVal = columnas[productIdx] ? columnas[productIdx].trim() : '';
            const marcaVal = columnas[brandIdx] ? columnas[brandIdx].trim() : 'Genérico';
            const precioVal = columnas[priceIdx] ? columnas[priceIdx].trim() : '0';

            // Clean Chilean Pesos format safely (removes any periods, spaces or commas used as thousands separator)
            const numericPrice = parseInt(precioVal.replace(/[^0-9]/g, ''), 10) || 0;

            return {
              id: idx,
              categoria: categoriaVal,
              producto: productoVal,
              marca: marcaVal,
              precio: numericPrice
            };
          }).filter(p => p.producto !== '' || p.categoria !== '');

          // Render list and set last updated timestamp
          renderPrecios();
          const now = new Date();
          updateText.innerText = `Precios al día: ${now.toLocaleDateString('es-CL')} ${now.toLocaleTimeString('es-CL', {hour: '2-digit', minute:'2-digit'})}`;
        })
        .catch(err => {
          console.error(err);
          renderErrorState(
            'No pudimos cargar la lista de precios',
            'Esto puede ocurrir por un problema de conexión temporal. Por favor reintenta.'
          );
        });
    }

    // 3. RENDER CONTENT DYNAMICALLY
    function renderPrecios() {
      // Group products by category
      const grouped = {};
      
      const filtered = rawProducts.filter(item => {
        // Apply search query
        const searchMatch = !currentSearch || 
          item.producto.toLowerCase().includes(currentSearch) || 
          item.marca.toLowerCase().includes(currentSearch) ||
          item.categoria.toLowerCase().includes(currentSearch);
        
        // Apply category filter
        const categoryMatch = currentFilter === 'all' || 
          item.categoria.toLowerCase() === currentFilter.toLowerCase();
          
        return searchMatch && categoryMatch;
      });

      if (filtered.length === 0) {
        renderEmptyState('No se encontraron productos', 'Intenta modificando los términos de búsqueda o filtros.');
        return;
      }

      filtered.forEach(item => {
        if (!grouped[item.categoria]) {
          grouped[item.categoria] = [];
        }
        grouped[item.categoria].push(item);
      });

      let html = '';

      for (const cat in grouped) {
        let emoji = '📦';
        const cleanCat = cat.toLowerCase().trim();
        if (cleanCat.includes('pollo')) emoji = '🐔';
        else if (cleanCat.includes('cerdo')) emoji = '🐷';
        else if (cleanCat.includes('vacuno')) emoji = '🥩';
        else if (cleanCat.includes('embutido') || cleanCat.includes('chorizo')) emoji = '🌭';
        else if (cleanCat.includes('bebida') || cleanCat.includes('jugo')) emoji = '🥤';

        html += `
          <div class="categoria-seccion glass">
            <h2 class="categoria-header">
              <span class="categoria-title-wrapper">
                <span class="categoria-emoji">${emoji}</span>
                <span>${cat}</span>
              </span>
              <span class="categoria-iva">Precio + IVA</span>
            </h2>
            <div class="productos-lista">
        `;

        grouped[cat].forEach(item => {
          // Highlight searched terms in names/brands
          let displayProducto = item.producto;
          let displayMarca = item.marca;
          
          if (currentSearch) {
            const regex = new RegExp(`(${escapeRegExp(currentSearch)})`, 'gi');
            displayProducto = item.producto.replace(regex, '<mark style="background: rgba(245, 158, 11, 0.3); color: inherit; padding: 2px 4px; border-radius: 4px;">$1</mark>');
            displayMarca = item.marca.replace(regex, '<mark style="background: rgba(245, 158, 11, 0.3); color: inherit; padding: 2px 4px; border-radius: 4px;">$1</mark>');
          }

          // Format price with CLP (Chilean Peso style: e.g. $10.790)
          const formattedPrice = '$' + new Intl.NumberFormat('es-CL').format(item.precio);

          html += `
            <div class="producto">
              <div class="producto-info">
                <div class="nombre">${displayProducto}</div>
                <div class="meta-row">
                  <span class="marca">${displayMarca}</span>
                </div>
              </div>
              <div class="precio-container">
                <div class="precio">${formattedPrice}</div>
              </div>
            </div>
          `;
        });

        html += `
            </div>
          </div>
        `;
      }

      contenido.innerHTML = html;
    }

    // UTILITIES FOR RENDERING & ERROR HANDLING
    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function renderEmptyState(title, text) {
      contenido.innerHTML = `
        <div class="state-container glass">
          <div class="state-icon">🔍</div>
          <div class="state-title">${title}</div>
          <div class="state-text">${text}</div>
        </div>
      `;
    }

    function renderErrorState(title, text) {
      contenido.innerHTML = `
        <div class="state-container glass" style="border-color: rgba(239, 68, 68, 0.3);">
          <div class="state-icon" style="color: #ef4444;">⚠️</div>
          <div class="state-title">${title}</div>
          <div class="state-text">${text}</div>
          <button class="retry-btn" onclick="retryLoad()">Reintentar Cargar</button>
        </div>
      `;
      updateText.innerText = "Error de conexión";
    }

    window.retryLoad = function() {
      contenido.innerHTML = document.getElementById('loadingSkeleton').outerHTML;
      updateText.innerText = "Reintentando...";
      init();
    };

    // 4. SEARCH INTERACTION
    searchInput.addEventListener('input', (e) => {
      currentSearch = e.target.value.toLowerCase().trim();
      clearSearch.style.display = currentSearch.length > 0 ? 'flex' : 'none';
      renderPrecios();
    });

    clearSearch.addEventListener('click', () => {
      searchInput.value = '';
      currentSearch = '';
      clearSearch.style.display = 'none';
      renderPrecios();
      searchInput.focus();
    });

    // 5. CATEGORIES PILLS FILTERING
    categoryPills.addEventListener('click', (e) => {
      const button = e.target.closest('.pill');
      if (!button) return;

      document.querySelectorAll('.pill').forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');

      currentFilter = button.dataset.category;
      renderPrecios();
    });

    // 6. THEME TOGGLER (Light / Dark Mode with persistency)
    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);

    themeToggle.addEventListener('click', () => {
      const currentTheme = document.body.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    });

    function setTheme(theme) {
      if (theme === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
        themeText.innerText = 'Modo Claro';
        localStorage.setItem('theme', 'dark');
      } else {
        document.body.removeAttribute('data-theme');
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
        themeText.innerText = 'Modo Oscuro';
        localStorage.setItem('theme', 'light');
      }
    }

    // 7. SHARE & WHATSAPP SHARING
    shareBtn.addEventListener('click', async () => {
      const shareUrl = window.location.href;
      const shareData = {
        title: 'Lista de Precios Carnes Lira',
        text: 'Mira nuestra lista de precios actualizada de carnes y más:',
        url: shareUrl
      };

      if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
        try {
          await navigator.share(shareData);
        } catch (err) {
          console.log('Compartir cancelado', err);
        }
      } else {
        // Fallback: Copy to clipboard and open WhatsApp
        navigator.clipboard.writeText(`${shareData.text} ${shareUrl}`).then(() => {
          alert('¡Enlace de la lista copiado al portapapeles! Ahora puedes pegarlo en WhatsApp.');
        }).catch(err => {
          // Alternative fallback to direct whatsapp api
          const waUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareData.text + ' ' + shareUrl)}`;
          window.open(waUrl, '_blank');
        });
      }
    });

    // Update floating WhatsApp contact URL dynamic sharing
    const floatBtn = document.getElementById('whatsappFloatBtn');
    floatBtn.href = `https://wa.me/56962608852?text=${encodeURIComponent("Hola, vi tu lista de precios y me gustaría hacer un pedido o consulta.")}`;





    // START
    init();
  </script>
